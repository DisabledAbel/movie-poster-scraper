<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Poster Finder (Firecrawl)</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0f172a, #1e293b);
        color: var(--text);
        min-height: 100vh;
      }
      .container {
        width: min(860px, 94vw);
        margin: 24px auto;
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 20px;
      }
      h1 { margin: 0 0 8px; font-size: 1.5rem; }
      p { color: var(--muted); line-height: 1.4; margin-top: 0; }
      .grid {
        display: grid;
        gap: 12px;
      }
      label { font-size: 0.95rem; color: #cbd5e1; }
      input {
        width: 100%;
        border: 1px solid #334155;
        background: #0b1220;
        color: var(--text);
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
      }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
        font-size: 1rem;
      }
      button:disabled { opacity: 0.55; }
      .status { margin-top: 14px; font-size: 0.95rem; }
      .error { color: var(--danger); }
      ul { margin: 12px 0 0; padding-left: 18px; }

      #results {
        list-style: none;
        padding: 0;
      }
      .poster-item {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }
      .poster-preview {
        width: 100%;
        max-width: 220px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #020617;
        object-fit: cover;
      }
      li { margin-bottom: 8px; }
      a { color: #93c5fd; word-break: break-all; }
      .suggestions {
        margin-top: 8px;
        list-style: none;
        padding: 0;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #0b1220;
        max-height: 220px;
        overflow-y: auto;
      }
      .suggestions[hidden] { display: none; }
      .suggestions li {
        margin: 0;
      }
      .suggestion-btn {
        width: 100%;
        text-align: left;
        margin: 0;
        border: 0;
        border-bottom: 1px solid #1f2937;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        font-size: 0.95rem;
        cursor: pointer;
      }
      .suggestion-btn:hover,
      .suggestion-btn.active {
        background: #1e293b;
      }
      .suggestions li:last-child .suggestion-btn,
      .suggestions li:last-child .suggestion-text {
        border-bottom: 0;
      }
      .suggestion-text {
        display: block;
        border-bottom: 1px solid #1f2937;
        padding: 10px 12px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Movie Poster Finder</h1>
      <p>Find direct movie poster URLs using Firecrawl. Works well on iPad in Safari/Chrome.</p>

      <form id="searchForm" class="grid">
        <div>
          <label for="title">Movie Title</label>
          <input id="title" type="text" placeholder="The Thing (1982)" autocomplete="off" />
          <ul id="suggestions" class="suggestions" hidden></ul>
        </div>


        <button id="searchBtn" type="submit">Find Top 5 Posters</button>
        <div id="status" class="status"></div>
        <ul id="results"></ul>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
