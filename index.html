<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Poster Finder (Firecrawl)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Movie Poster Finder</h1>
      <p>Find direct movie poster URLs using Firecrawl. Works well on iPad in Safari/Chrome.</p>

      <div class="grid">
        <div>
          <label for="title">Movie Title</label>
          <input id="title" type="text" placeholder="Inception" autocomplete="off" />
          <ul id="suggestions" class="suggestions" hidden></ul>
        </div>

        <button id="searchBtn">Find Top 5 Posters</button>
        <div id="status" class="status"></div>
        <ul id="results"></ul>
      </div>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
