name: Auto Merge

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  merge:
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR
        uses: peter-evans/merge-pull-request@v3
        with:
          merge-method: squash
