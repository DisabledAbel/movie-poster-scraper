name: Auto Rebase PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  autorebase:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "auto-rebase-bot"
          git config --global user.email "actions@github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Rebase branch onto main
        run: |
          git rebase origin/main || echo "Rebase conflict"

      - name: Push changes
        run: |
          git push --force-with-lease || echo "Nothing to push"
