name: Resolve PR Conflicts

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "conflict-bot"
          git config user.email "actions@github.com"

      - name: Fetch branches
        run: |
          git fetch origin main
          git fetch origin pull/6/head:pr6

      - name: Checkout PR branch
        run: git checkout pr6

      - name: Merge main
        run: |
          git merge origin/main || true

      - name: Resolve known conflicts
        run: |
          git checkout --ours app.js || true
          git checkout --ours index.html || true
          git add app.js index.html || true

      - name: Commit if needed
        run: |
          git commit -m "Auto resolve conflicts" || echo "Nothing to commit"

      - name: Push fix
        run: |
          git push origin pr6 --force-with-lease
