name: Auto Resolve PR Conflicts

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "conflict-bot"
          git config --global user.email "actions@github.com"

      - name: Fetch branches
        run: |
          git fetch origin main
          git fetch origin ${{ github.head_ref }}

      - name: Checkout PR branch
        run: |
          git checkout ${{ github.head_ref }}

      - name: Merge main
        run: |
          git merge origin/main || true

      - name: Force resolve conflicts
        run: |
          git checkout --ours app.js || true
          git checkout --ours index.html || true
          git add app.js index.html || true

      - name: Commit resolution
        run: |
          git commit -m "Auto resolve conflicts" || true

      - name: Push changes
        run: |
          git push origin HEAD --force-with-lease
